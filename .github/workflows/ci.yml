name: Lint code

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint and format the code
        run: |
          uv run ruff check --extend-select I .
          uv run ruff format --check .
