name: Lint code

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: ruff check
      uses: astral-sh/ruff-action@v3
      with:
        args: check --extend-select I .
    - name: ruff format
      uses: astral-sh/ruff-action@v3
      with:
        args: format --check .
